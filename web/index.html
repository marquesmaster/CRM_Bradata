<!DOCTYPE html>
<html lang="pt-BR" data-theme="light" data-accent="indigo" data-density="cozy" data-radius="normal">
<head>

  <title>CRM Bradata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
